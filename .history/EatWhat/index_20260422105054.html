<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, maximum-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="index.css">
  <title>今天吃什么</title>
</head>

<body>
  <div class="container">
    <div class="logo">
      <img src="images/eat.svg" width="64" height="64" alt="美食图标">
    </div>
    <h1>今天<span id="time"></span>吃<span class="food" id="what">什么</span>？</h1>
    <p>解决上班族世纪难题，吃什么不用愁！</p>
    
    <div class="btn-group">
      <button class="btn btn-primary" id="start">开始</button>
      <button class="btn btn-setting" id="openSetting">⚙️ 设置菜单</button>
    </div>
  </div>

  <!-- 设置菜单弹窗 -->
  <div id="settingModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>自定义菜单</h2>
        <span class="close-btn" id="closeSetting">&times;</span>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>早餐:</label>
          <textarea id="input-breakfast" placeholder="用逗号或空格分隔，例如：豆浆 油条 包子"></textarea>
        </div>
        <div class="form-group">
          <label>午餐:</label>
          <textarea id="input-lunch" placeholder="用逗号或空格分隔，例如：米饭 面条 麻辣烫"></textarea>
        </div>
        <div class="form-group">
          <label>下午茶:</label>
          <textarea id="input-snack" placeholder="用逗号或空格分隔，例如：奶茶 咖啡 水果"></textarea>
        </div>
        <div class="form-group">
          <label>晚餐:</label>
          <textarea id="input-dinner" placeholder="用逗号或空格分隔，例如：沙拉 轻食 火锅"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-save" id="saveSetting">保存并关闭</button>
      </div>
    </div>
  </div>

  <script src="index.js"></script>
</body>

</html>
